<section class="mx-5 sm:mx-7 md:mx-9 lg:mx-25">
  <div class="flex items-center justify-center">
    <app-skill-3d [categories]="this.categories"></app-skill-3d>
  </div>

  <div class="border grid grid-cols-3">
    @for (category of categories; track category) {
    <div class="col-span-1 mb-4 border flex flex-col items-center">
      <div class="flex items-center justify-center gap-2 mb-2">
        <i [ngClass]="['fa-solid', category.icon]"></i>
        <span>
          {{category.category | translate }}
        </span>
      </div>

      <div class="flex flex-row flex-wrap items-center gap-3 w-full">
        @for (skill of category.skills; track skill) {
        <div class="flex items-center gap-2">
          <img [src]="'./../../../assets/logos/' + skill.icon + '.svg'" width="20px" [alt]="skill.description + 'icon'">
          <span>
            {{skill.description | translate }}
          </span>
        </div>
        }
      </div>
    </div>
    }
  </div>
</section>
