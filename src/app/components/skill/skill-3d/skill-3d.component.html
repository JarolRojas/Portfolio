<canvas id="logoCanvas"  height="300" width="600" class="cursor-grab border">
</canvas>

<div id="logoList" style="display: none;">
  <ul>
    <!-- Itera sobre las categorías -->
    @for (category of categories; track category.category) {
      <!-- Itera sobre las skills de cada categoría -->
      @for (skill of category.skills; track skill.description) {
        <li>
          <a [href]="skill.link" target="_blank">
            <img [src]="'assets/logos/' + skill.icon" [alt]="skill.description + ' logo'" width="30px">
          </a>
        </li>
      }
    }
  </ul>
</div>
