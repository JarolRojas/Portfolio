<div *ngIf="account as acc" class="flex justify-center">



  <div class="border rounded-2xl">
    <div class="flex items-center gap-1">
      <div class="">
        <img [src]="acc.imgUrl" [alt]="acc.name" class="size-20 md:size-25 lg:size-30 rounded-full" />
      </div>
      <div class="">
        <h2 class="text-2xl md:text-4xl lg:text-5xl font-semibold">{{ acc.name }}</h2>
        <a [href]="acc.profileUrl" target="_blank">&#64;{{ acc.username }}</a>
      </div>
    </div>
    <div>
      <p class="text-sm md:text-base lg:text-lg p-2">{{ acc.bio }}</p>
    </div>
  </div>
